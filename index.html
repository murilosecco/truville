<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>truVille Café — Embalagem Tradicional 500g</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #120C06;
  --panel: #1A1008;
  --gold: #C8963E;
  --gold-light: #E8B96A;
  --cream: #F5EDD8;
  --muted: #7A6A55;
  --text: #EDE3D0;
  --star-off: #3A2E20;
  --star-on: #E8B96A;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, serif;
  height: 100vh;
  overflow: hidden;
}

.logo-svg { width: 100%; height: auto; display: block; }
.logo-svg .cls-1 { fill: #f0801b; }
.logo-svg .cls-2 { fill: #fff9ed; }

/* ══════════════════════════
   CAPA
══════════════════════════ */
#cover {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #2A1A08 0%, #0E0804 100%);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
#cover.hidden {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

.cover-logo { width: min(360px, 72vw); margin-bottom: 36px; }

.cover-tagline {
  font-family: system-ui, sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 56px;
  text-align: center;
}

.cover-btn {
  padding: 14px 48px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold-light);
  font-family: system-ui, sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.25s;
}
.cover-btn:hover {
  background: rgba(200,150,62,0.1);
  letter-spacing: 4px;
}

.cover-grain {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.4;
}

/* ══════════════════════════
   STAGE (apresentação)
══════════════════════════ */
.stage {
  display: grid;
  grid-template-columns: 1fr 320px;
  height: 100vh;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.6s ease 0.3s;
}
.stage.visible { opacity: 1; }

/* ── PAINEL IMAGEM ── */
.image-panel {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 58%, #2A1E0E 0%, #0E0804 78%);
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.45s ease;
  pointer-events: none;
}
.slide.active { opacity: 1; pointer-events: auto; }

.slide img {
  max-height: 93vh;
  max-width: 92%;
  object-fit: contain;
  filter: drop-shadow(0 20px 56px rgba(0,0,0,0.9));
}

.version-bg-num {
  position: absolute;
  bottom: 20px;
  left: 28px;
  font-size: 120px;
  font-weight: bold;
  color: rgba(200,150,62,0.06);
  line-height: 1;
  pointer-events: none;
  letter-spacing: -4px;
  user-select: none;
}

/* ── PAINEL LATERAL ── */
.info-panel {
  background: var(--panel);
  border-left: 1px solid rgba(200,150,62,0.1);
  display: flex;
  flex-direction: column;
  padding: 28px 24px 20px;
  overflow-y: auto;
  position: relative;
}
.info-panel::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
}

.panel-sub {
  font-family: system-ui, sans-serif;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  padding-top: 4px;
}

/* version cards */
.version-info-wrap { position: relative; flex: 1; min-height: 0; }

.version-info {
  position: absolute;
  width: 100%;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  pointer-events: none;
}
.version-info.active {
  position: relative;
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.version-tag {
  font-family: system-ui, sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.version-title {
  font-size: 20px;
  color: var(--gold-light);
  font-weight: normal;
  margin-bottom: 12px;
  line-height: 1.2;
}
.version-desc {
  font-family: system-ui, sans-serif;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
  opacity: 0.8;
  margin-bottom: 14px;
}
.version-attrs { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.attr { display: flex; align-items: baseline; gap: 10px; }
.attr-label {
  font-family: system-ui, sans-serif;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  min-width: 65px;
  white-space: nowrap;
}
.attr-value {
  font-family: system-ui, sans-serif;
  font-size: 11px;
  color: var(--muted);
}

/* rating */
.rating-section { margin-bottom: 16px; }
.rating-label {
  font-family: system-ui, sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
.stars { display: flex; gap: 5px; }
.star {
  font-size: 26px;
  color: var(--star-off);
  cursor: pointer;
  transition: color 0.12s, transform 0.12s;
  user-select: none;
}
.star:hover, .star.active { color: var(--star-on); transform: scale(1.15); }

/* nav */
.nav-area {
  margin-top: auto;
  padding-top: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-btn {
  background: transparent;
  border: 1px solid rgba(200,150,62,0.22);
  color: var(--gold);
  width: 38px; height: 38px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  flex-shrink: 0;
}
.nav-btn:hover { background: rgba(200,150,62,0.1); border-color: var(--gold); }
.nav-btn:disabled { opacity: 0.18; cursor: not-allowed; }

.progress-track {
  flex: 1; height: 2px;
  background: rgba(200,150,62,0.1);
  border-radius: 1px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--gold);
  border-radius: 1px; transition: width 0.4s ease;
}
.nav-counter {
  font-family: system-ui, sans-serif;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
}

.dots {
  display: flex; gap: 5px; flex-wrap: wrap;
  justify-content: center; margin-top: 10px;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(200,150,62,0.15);
  cursor: pointer; border: none; padding: 0;
  transition: all 0.18s;
}
.dot.active { background: var(--gold); transform: scale(1.4); }

.results-btn {
  display: block; width: 100%;
  margin-top: 12px; padding: 9px;
  background: transparent;
  border: 1px solid rgba(200,150,62,0.25);
  color: var(--gold);
  font-family: system-ui, sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.18s;
}
.results-btn:hover { background: rgba(200,150,62,0.07); border-color: var(--gold); }

/* ══════════════════════════
   RESULTS OVERLAY
══════════════════════════ */
.results-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,6,2,0.96);
  z-index: 100; overflow-y: auto;
  padding: 40px 20px;
}
.results-overlay.open { display: block; }

.results-header {
  text-align: center; margin-bottom: 32px;
}
.results-header .rh-logo { width: 140px; margin: 0 auto 14px; }
.results-header h2 {
  font-size: 18px; color: var(--gold-light);
  font-weight: normal; letter-spacing: 1px;
}
.results-header p {
  font-family: system-ui, sans-serif;
  font-size: 10px; color: var(--muted);
  margin-top: 5px; letter-spacing: 2px;
  text-transform: uppercase;
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 14px;
  max-width: 920px;
  margin: 0 auto 32px;
}
.result-card {
  background: var(--panel);
  border: 1px solid rgba(200,150,62,0.1);
  border-radius: 3px;
  padding: 12px;
  text-align: center;
  position: relative;
}
.result-card.top-pick {
  border-color: var(--gold);
  box-shadow: 0 0 24px rgba(200,150,62,0.14);
}
.top-badge {
  position: absolute; top: -8px; left: 50%;
  transform: translateX(-50%);
  background: var(--gold); color: var(--bg);
  font-family: system-ui, sans-serif;
  font-size: 8px; font-weight: bold;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 10px; white-space: nowrap;
}
.result-card img {
  width: 75px; height: 96px;
  object-fit: contain; margin-bottom: 8px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
}
.result-card-title {
  font-family: system-ui, sans-serif;
  font-size: 10px; color: var(--cream);
  margin-bottom: 5px; line-height: 1.3;
}
.result-stars { color: var(--star-on); font-size: 13px; letter-spacing: 1px; }
.result-stars .empty { color: var(--star-off); }
.result-no-rating {
  font-family: system-ui, sans-serif;
  font-size: 10px; color: var(--muted); font-style: italic;
}
.close-results {
  display: block; margin: 0 auto;
  padding: 12px 36px; background: transparent;
  border: 1px solid rgba(200,150,62,0.28);
  color: var(--gold);
  font-family: system-ui, sans-serif;
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  border-radius: 2px; transition: all 0.18s;
}
.close-results:hover { background: rgba(200,150,62,0.07); border-color: var(--gold); }

/* ══════════════════════════
   MOBILE
══════════════════════════ */
@media (max-width: 700px) {
  body { overflow: auto; }

  .stage {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .image-panel { flex: 1; min-height: 0; }

  .slide img {
    max-height: 100%;
    max-width: 94%;
  }

  .version-bg-num { font-size: 64px; bottom: 8px; left: 10px; }

  .info-panel {
    flex-shrink: 0;
    padding: 14px 18px 14px;
    border-left: none;
    border-top: 1px solid rgba(200,150,62,0.13);
    overflow-y: auto;
    max-height: 50vh;
  }

  .panel-sub { margin-bottom: 6px; }

  .version-info-wrap { min-height: unset; }
  .version-info { position: relative !important; opacity: 1 !important; transform: none !important; }
  .version-info:not(.active) { display: none; }

  .version-title { font-size: 17px; margin-bottom: 6px; }
  .version-desc { display: none; }
  .version-attrs { margin-bottom: 10px; }

  .stars .star { font-size: 30px; }

  .nav-area { padding-top: 10px; margin-top: 6px; }
  .dots { margin-top: 6px; }
  .results-btn { margin-top: 8px; }

  .results-grid { grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); gap: 10px; }
  .results-overlay { padding: 20px 14px; }

  .cover-logo { width: min(280px, 80vw); }
}

@media (max-width: 400px) {
  .results-grid { grid-template-columns: repeat(2, 1fr); }
}

.key-hint {
  position: fixed; bottom: 10px; left: 50%;
  transform: translateX(-50%);
  font-family: system-ui, sans-serif;
  font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(200,150,62,0.18);
  pointer-events: none; white-space: nowrap;
}
@media (max-width: 700px) { .key-hint { display: none; } }

/* ══ LIGHTBOX ══ */
.slide.active img { cursor: zoom-in; }

#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(6,3,1,0.97);
  align-items: center; justify-content: center;
  cursor: zoom-out;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-height: 96vh; max-width: 96vw;
  object-fit: contain;
  filter: drop-shadow(0 28px 72px rgba(0,0,0,1));
  animation: lbIn 0.22s ease;
  cursor: zoom-out;
}
@keyframes lbIn {
  from { opacity: 0; transform: scale(0.93); }
  to   { opacity: 1; transform: scale(1); }
}
#lightbox-close {
  position: fixed; top: 18px; right: 22px;
  background: transparent;
  border: 1px solid rgba(200,150,62,0.35);
  color: #C8963E;
  width: 42px; height: 42px; border-radius: 50%;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; z-index: 201;
}
#lightbox-close:hover { background: rgba(200,150,62,0.12); border-color: #C8963E; }
#lightbox-num {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%);
  font-family: system-ui, sans-serif;
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(200,150,62,0.4);
  pointer-events: none;
}
</style>
</head>

const total = slides.length;
let current = 0;
const ratings = new Array(total).fill(0);

function enterPresentation() {
  document.getElementById("cover").classList.add("hidden");
  document.getElementById("stage").classList.add("visible");
}

function init() {
  const panel = document.getElementById("imagePanel");
  const infoWrap = document.getElementById("infoWrap");
  const dotsEl = document.getElementById("dots");

  slides.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "slide" + (i === 0 ? " active" : "");
    div.id = "slide-" + i;
    const img = document.createElement("img");
    img.src = s.img;
    img.alt = s.title;
    img.onclick = (e) => { e.stopPropagation(); openLightbox(); };
    div.appendChild(img);
    panel.insertBefore(div, document.getElementById("versionBg"));

    const card = document.createElement("div");
    card.className = "version-info" + (i === 0 ? " active" : "");
    card.id = "info-" + i;
    card.innerHTML = `
      <div class="version-title">${s.title}</div>
      <div class="version-desc">${s.desc}</div>
      <div class="version-attrs">
        <div class="attr"><span class="attr-label">Fundo</span><span class="attr-value">${s.fundo}</span></div>
        <div class="attr"><span class="attr-label">Cena</span><span class="attr-value">${s.cena}</span></div>
        <div class="attr"><span class="attr-label">Persona</span><span class="attr-value">${s.persona}</span></div>
      </div>`;
    infoWrap.appendChild(card);

    const dot = document.createElement("button");
    dot.className = "dot" + (i === 0 ? " active" : "");
    dot.setAttribute("aria-label", "Variação " + (i+1));
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });

  document.querySelectorAll(".star").forEach(star => {
    star.addEventListener("click", () => {
      ratings[current] = parseInt(star.getAttribute("data-v"));
      updateStars();
    });
    star.addEventListener("mouseenter", () => {
      const val = parseInt(star.getAttribute("data-v"));
      document.querySelectorAll(".star").forEach(s =>
        s.classList.toggle("active", parseInt(s.getAttribute("data-v")) <= val));
    });
    star.addEventListener("mouseleave", updateStars);
  });

  updateUI();
}

function updateStars() {
  const val = ratings[current];
  document.querySelectorAll(".star").forEach(s =>
    s.classList.toggle("active", parseInt(s.getAttribute("data-v")) <= val));
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= total) return;
  goTo(next);
}

function goTo(idx) {
  document.getElementById("slide-" + current).classList.remove("active");
  document.getElementById("info-" + current).classList.remove("active");
  document.querySelectorAll(".dot")[current].classList.remove("active");
  current = idx;
  document.getElementById("slide-" + current).classList.add("active");
  document.getElementById("info-" + current).classList.add("active");
  document.querySelectorAll(".dot")[current].classList.add("active");
  updateUI();
  updateStars();
}

function updateUI() {
  document.getElementById("versionBg").textContent = String(current+1).padStart(2,"0");
  document.getElementById("varNum").textContent = String(current+1).padStart(2,"0");
  document.getElementById("counter").textContent = (current+1) + " / " + total;
  document.getElementById("progressFill").style.width = ((current+1)/total*100) + "%";
  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = current === total-1;
}

function openResults() {
  const grid = document.getElementById("resultsGrid");
  grid.innerHTML = "";
  const sorted = slides.map((s,i) => ({...s, idx: i, rating: ratings[i]}))
    .sort((a,b) => b.rating - a.rating);
  sorted.forEach((s, rank) => {
    const card = document.createElement("div");
    card.className = "result-card" + (rank === 0 && s.rating > 0 ? " top-pick" : "");
    let starsHtml = "";
    for(let i=1; i<=5; i++)
      starsHtml += `<span class="${i <= s.rating ? "" : "empty"}">★</span>`;
    card.innerHTML = `
      ${rank === 0 && s.rating > 0 ? "<div class=\"top-badge\">⭐ Favorita</div>" : ""}
      <img src="${s.img}" alt="${s.title}">
      <div class="result-card-title">${String(s.idx+1).padStart(2,"0")} — ${s.title}</div>
      ${s.rating > 0 ? `<div class="result-stars">${starsHtml}</div>` : "<div class=\"result-no-rating\">Sem avaliação</div>"}`;
    grid.appendChild(card);
  });
  document.getElementById("resultsOverlay").classList.add("open");
}


function openLightbox() {
  const img = document.querySelector('#slide-' + current + ' img');
  if (!img) return;
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox-num').textContent =
    String(current+1).padStart(2,'0') + ' / ' + total + '  ·  ' + slides[current].title;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function closeResults() {
  document.getElementById("resultsOverlay").classList.remove("open");
}

document.addEventListener("keydown", e => {
  if (document.getElementById("lightbox").classList.contains("open")) {
    if (e.key === "Escape") closeLightbox();
    return;
  }
  if (document.getElementById("resultsOverlay").classList.contains("open")) {
    if (e.key === "Escape") closeResults();
    return;
  }
  if (e.key === "ArrowRight" || e.key === "ArrowDown") navigate(1);
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") navigate(-1);
  if (e.key === "Escape") goTo(0);
  const num = parseInt(e.key);
  if (num >= 1 && num <= 5) { ratings[current] = num; updateStars(); }
});

init();
</script>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-num"></div>
</div>
</body>
</html>
